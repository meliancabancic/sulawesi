<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test Local OL</title>
<link rel="stylesheet" href="ol.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { height:100vh; }
#map { width:100%; height:100%; }
#status { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.7); color:white; padding:8px 12px; font-family:monospace; font-size:13px; border-radius:4px; z-index:999; }
</style>
</head>
<body>
<div id="map"></div>
<div id="status">Cargando...</div>
<script src="ol.js"></script>
<script>
const st = document.getElementById('status');
try {
  st.textContent = 'ol: ' + (typeof ol !== 'undefined' ? 'OK' : 'NO DEFINIDO');
  const map = new ol.Map({
    target: 'map',
    layers: [new ol.layer.Tile({
      source: new ol.source.XYZ({
        url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        maxZoom: 19
      })
    })],
    view: new ol.View({ center: ol.proj.fromLonLat([122, -1.5]), zoom: 6 })
  });
  st.textContent = 'MAP OK — OpenLayers funciona';
  st.style.background = 'rgba(0,120,0,0.85)';
} catch(e) {
  st.textContent = 'ERROR: ' + e.message;
  st.style.background = 'rgba(150,0,0,0.85)';
}
</script>
</body>
</html>
